<svg class="team-crest"
     [attr.width]="size"
     [attr.height]="size"
     viewBox="0 0 100 100"
     role="img"
     [attr.aria-label]="title">
  <ng-container [ngSwitch]="variant">
    <g *ngSwitchCase="0">
      <circle cx="50" cy="50" r="44" [attr.fill]="primary"></circle>
      <path d="M50 6 A44 44 0 0 1 50 94 Z" [attr.fill]="secondary"></path>
      <circle cx="50" cy="50" r="35" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3"></circle>
    </g>
    <g *ngSwitchCase="1">
      <path d="M50 5 L91 19 L85 66 Q78 86 50 96 Q22 86 15 66 L9 19 Z" [attr.fill]="primary"></path>
      <path d="M50 5 L91 19 L85 66 Q78 86 50 96 Z" [attr.fill]="secondary"></path>
      <path d="M50 12 L83 23 L78 63 Q71 79 50 88 Q29 79 22 63 L17 23 Z" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3"></path>
    </g>
    <g *ngSwitchCase="2">
      <path d="M25 8 L75 8 L96 50 L75 92 L25 92 L4 50 Z" [attr.fill]="primary"></path>
      <path d="M4 50 L50 28 L96 50 L75 92 L25 92 Z" [attr.fill]="secondary"></path>
      <path d="M27 15 L71 15 L87 50 L70 84 L29 84 L12 50 Z" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="3"></path>
    </g>
    <g *ngSwitchCase="3">
      <path d="M50 3 L96 50 L50 97 L4 50 Z" [attr.fill]="primary"></path>
      <path d="M50 3 L96 50 L50 97 Z" [attr.fill]="secondary"></path>
      <path d="M50 13 L86 50 L50 87 L14 50 Z" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3"></path>
    </g>
    <g *ngSwitchCase="4">
      <rect x="7" y="7" width="86" height="86" rx="19" [attr.fill]="primary"></rect>
      <path d="M18 82 L72 10 L90 10 L90 42 L55 90 L18 90 Z" [attr.fill]="secondary"></path>
      <rect x="14" y="14" width="72" height="72" rx="14" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3"></rect>
    </g>
    <g *ngSwitchCase="5">
      <circle cx="50" cy="50" r="44" [attr.fill]="primary"></circle>
      <path d="M10 39 H90 V61 H10 Z" [attr.fill]="secondary"></path>
      <circle cx="50" cy="50" r="35" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3"></circle>
    </g>
    <g *ngSwitchCase="6">
      <path d="M13 12 H87 L82 68 Q72 88 50 97 Q28 88 18 68 Z" [attr.fill]="primary"></path>
      <path d="M18 31 L50 58 L82 31 L80 55 L50 80 L20 55 Z" [attr.fill]="secondary"></path>
      <path d="M20 19 H80 L75 65 Q67 80 50 88 Q33 80 25 65 Z" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3"></path>
    </g>
    <g *ngSwitchDefault>
      <path d="M50 4 L94 36 L78 91 H22 L6 36 Z" [attr.fill]="primary"></path>
      <path d="M6 36 L50 4 L94 36 Z" [attr.fill]="secondary"></path>
      <path d="M50 13 L84 39 L71 83 H29 L16 39 Z" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3"></path>
    </g>
  </ng-container>

  <text x="50" y="58" text-anchor="middle" class="crest-initials">{{ initials }}</text>
  <path *ngIf="variant % 2 === 0" d="M35 68 H65" stroke="rgba(255,255,255,.72)" stroke-width="3" stroke-linecap="round"></path>
  <circle *ngIf="variant % 2 === 1" cx="50" cy="69" r="3" fill="rgba(255,255,255,.8)"></circle>
</svg>
