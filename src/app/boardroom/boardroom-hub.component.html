<div class="container py-4">
  <h2 class="mb-1"><i class="bi bi-bank me-2"></i>Boardroom</h2>
  <p class="text-muted mb-4">Your life beyond the dugout — wealth, personal assets and club ownership.</p>

  <div class="row g-3">
    <div class="col-md-4" *ngFor="let p of pages">
      <a [routerLink]="p.route" class="text-decoration-none">
        <div class="card h-100 boardroom-card shadow-sm">
          <div class="card-body text-center">
            <i class="bi {{ p.icon }} display-5 text-primary mb-2"></i>
            <h5 class="card-title">{{ p.title }}</h5>
            <p class="card-text text-muted small">{{ p.desc }}</p>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
