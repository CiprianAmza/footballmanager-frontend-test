<div class="container py-4">
  <div class="d-flex align-items-center mb-3">
    <a routerLink="/boardroom" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
    <h3 class="mb-0"><i class="bi bi-building me-2"></i>Club Ownership</h3>
  </div>

  <div *ngIf="loading" class="text-muted">Loading...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="message" class="alert alert-info py-2">{{ message }}</div>

  <ng-container *ngIf="data && !loading">
    <div class="card mb-3 shadow-sm">
      <div class="card-body d-flex justify-content-between">
        <strong>{{ data.name }}</strong>
        <span>Personal wealth: <span class="wealth-positive">{{ money(data.wealth) }}</span></span>
      </div>
    </div>

    <div *ngIf="!data.ownedClubs?.length" class="alert alert-secondary">
      This manager does not own any clubs. Acquire a majority stake on the
      <a routerLink="/boardroom/assets/{{ data.humanId }}">Personal Assets</a> page first.
    </div>

    <div class="card mb-3 shadow-sm" *ngFor="let c of data.ownedClubs">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-shield-fill me-1 text-success"></i>{{ c.teamName }}</span>
        <span class="badge bg-success owner-badge">OWNER</span>
      </div>
      <div class="card-body row g-2 align-items-end">
        <div class="col-md-6">
          <label class="form-label small">Amount</label>
          <input type="number" class="form-control" [(ngModel)]="amounts[c.teamId]" min="0" placeholder="0">
        </div>
        <div class="col-md-3">
          <button class="btn btn-success w-100" (click)="invest(c.teamId)">
            <i class="bi bi-arrow-down-circle me-1"></i>Invest
          </button>
        </div>
        <div class="col-md-3">
          <button class="btn btn-outline-warning w-100" (click)="withdraw(c.teamId)">
            <i class="bi bi-arrow-up-circle me-1"></i>Withdraw
          </button>
        </div>
      </div>
    </div>
  </ng-container>
</div>
